<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Toolbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Home Page -->
    <div id="home-page">
      <header class="site-header">
        <div class="logo-container">
          <pre class="ascii-logo">
 ┌┬┐┬ ┬  ╔╦╗╔═╗╔═╗╦  ╔╗ ╔═╗═╗ ╦
 │││└┬┘   ║ ║ ║║ ║║  ╠╩╗║ ║╔╩╦╝
 ┴ ┴ ┴    ╩ ╚═╝╚═╝╩═╝╚═╝╚═╝╩ ╚═</pre>
          <p class="tagline">> browser-based utilities for developers & designers<span class="cursor">_</span></p>
        </div>
      </header>
      <div class="search-container">
        <div class="search-wrapper">
          <span class="search-icon">⌘</span>
          <input type="text" id="search-input" placeholder="Search tools..." autocomplete="off" spellcheck="false">
          <kbd class="search-hint">K</kbd>
        </div>
      </div>
      <main id="tools-grid"></main>
      <footer class="site-footer">
        <p>All tools run locally in your browser. No data is uploaded.</p>
      </footer>
    </div>

    <!-- Tool Page -->
    <div id="tool-page" style="display:none">
      <nav class="tool-nav">
        <a href="#" class="back-btn" id="back-btn">
          <span class="back-arrow">←</span>
          <span>Back</span>
        </a>
        <h1 id="tool-title"></h1>
      </nav>
      <p id="tool-description"></p>
      <div id="tool-content"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- External libs (loaded lazily) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <!-- App -->
  <script src="js/app.js"></script>
  <script src="js/tools/colour.js"></script>
  <script src="js/tools/typography.js"></script>
  <script src="js/tools/image.js"></script>
  <script src="js/tools/image-upscaler.js"></script>
  <script src="js/tools/social.js"></script>
  <script src="js/tools/dev.js"></script>
  <script src="js/tools/other.js"></script>
</body>
</html>
